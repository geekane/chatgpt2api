# Choreo 组件配置文件
schemaVersion: 1.0

# 后端服务组件
components:
  - name: chatgpt2api-backend
    type: service
    language: python
    buildpack: dockerfile
    dockerfilePath: ./Dockerfile
    port: 8080
    env:
      - name: CHATGPT2API_AUTH_KEY
        value: ${CHATGPT2API_AUTH_KEY}
      - name: STORAGE_BACKEND
        value: json
      - name: PYTHONUNBUFFERED
        value: "1"
    healthCheck:
      path: /health?format=json
      port: 8080
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 3
    resources:
      requests:
        memory: 512Mi
        cpu: 500m
      limits:
        memory: 1Gi
        cpu: 1000m

  # 前端已集成在后端 Dockerfile 中，作为静态文件服务
